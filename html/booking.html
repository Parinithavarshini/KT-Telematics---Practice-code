<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Movie Booking</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <link rel="icon" href="../images/Favicon.jpg">
        <link rel="stylesheet" href="../css/movie.css">
    </head>
    <body class="book">
        <nav>
            <div class="h1">
            <h1 id="you" style="color: #dcc063; margin-top: 15px;">M4You</h1>
            <a href="movie.html" class="h3"><h2>Home</h2></a>
            <a href="upcoming.html" class="h3"><h2>Movies</h2></a>
            <a href="theatres.html" class="h3"><h2>Theatres</h2></a>
            <a href="#" class="h3"><h2>News</h2></a>
            </div>
        </nav>
        <div class="whole">
        <h3>ENTER YOUR DETAILS TO BOOK YOUR TICKETS</h3>
        <form action="#" method="get">
            <div class="form">
            <div>
                <label for="Username">Username<br></label>
                <input type="text" name="Username" id="Username" placeholder="Enter your name" required><br><br>
            </div>
            <div>
                <label for="Password">Password<br></label>
                <input type="password" name="Password" id="Password" placeholder="Enter your password" required minlength="6"><br><br>
            </div>
            <div>
                <label for="dob">Date of Birth<br></label>
                <input type="date" name="dob" id="dob" required><br><br>
            </div>
            <div>
                <label for="country">Choose your country</label>
                <select name="country" id="country" required>
                    <option value="">Select your Country</option>
                    <option value="USA">USA</option>
                    <option value="UK">UK</option>
                    <option selected value="India">India</option>
                </select>
            </div>
            <div>
                <p>Select your gender</p>
                <input type="radio" name="gender" id="male" value="male">
                <label for="male">Male</label>
                <input type="radio" name="gender" id="female" value="female">
                <label for="female">Female<br><br></label>
            </div>
            <div>
                <label for="mail">Enter your email<br></label>
                <input type="email" name="mail" id="mail" required placeholder="Eg:xyz@gmail.com"><br><br>
            </div>
            <div>
                <label for="phone">Phone number<br></label>
                <input type="tel" name="phone" id="phone" required maxlength="10"><br><br>
            </div>
            <div>
                <label for="ticket">Number of tickets<br></label>
                <input type="number" name="ticket" id="ticket" required maxlength="3"><br><br>
            </div>
            <div>
                <label for="mname">Choose Movie </label>
                <select name="mname" id="mname" required>
                    <option value="8">8-Thotakal</option>
                    <option value="Goat">Goat</option>
                    <option value="Retro">Retro</option>
                    <option selected value="Sirai">Sirai</option>
                </select>
            </div>
            <div>
                <p>Scan here for making payment</p>
                <img src="https://tse4.mm.bing.net/th/id/OIP.ZFt9Ib6ypFgdYK14UxUAhwHaHa?pid=Api&P=0&h=180">
            </div>
            <div>
                <br><label for="file">Upload your Payment screenshot<br></label>
                <input type="file" name="file" id="file" accept=".pdf,.docx" required>
            </div><br>
            </div>
                <button type="submit">SUBMIT</button>
                <button type="reset">RESET</button>
                <button type="button">CLICK HERE</button>
            </div>
            </div>
        </form>
    </body>
</html>
