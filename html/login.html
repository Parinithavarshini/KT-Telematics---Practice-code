<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <link rel="stylesheet" href="../css/movie.css">
        <title>Login</title>
        <link rel="icon" href="../images/Favicon.jpg">
    </head>
    <body class="log">
         <form action="movie.html" method="get">
            <div class="form1">
            <h2>LOGIN</h2>
            <div>
                <label for="Username">Username<br></label>
                <input type="text" name="Username" id="Username" placeholder="Enter your name" required><br><br>
            </div>
            <div>
                <label for="Password">Password<br></label>
                <input type="password" name="Password" id="Password" placeholder="Enter your password" required minlength="6" autocomplete="current-password"><br><br>
            </div>
            <button type="submit" class="button">SUBMIT</button>
            </div>
        </form>
    </body>
</html>
